<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LED 色温度リニア調整計算ツール</title>
  
  <!-- 引入 React, ReactDOM, Babel (用於解析 JSX) 與 Tailwind CSS -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // 內建簡易多國語系字典
    const translations = {
      zh: {
        title: "LED 色溫線性調整計算器",
        base_cct: "基準物理色溫 (校正點)",
        base_desc: "顯示屏出廠或硬體校正時的預設白點色溫。",
        target_cct: "目標色溫調整",
        warm: "暖橘",
        standard: "標準白",
        cold: "冷藍",
        preview: "視覺色溫預覽",
        hw_ratio: "硬體 RGB 控制比率",
        hw_desc: "為了從 {{base}}K 變換至 {{target}}K 且保持在普朗克軌跡上，硬體端 R/G/B 通道應套用以下線性衰減比率：",
        algorithm: "演算法核心邏輯",
        step1: "使用 CIE 1931 解析公式計算基準色溫與目標色溫位於普朗克軌跡上的精確座標。",
        step2: "將 xy 座標轉至 XYZ 空間後，透過 sRGB 矩陣轉換為線性光能量 (未經 Gamma 校正)，確保能量符合物理發光疊加定律。",
        step3: "目標能量除以基準能量，並將最高數值的通道拉滿至 1.0 (100%)，避免亮度過度折損。",
        code_comment: "傳送給硬體底層的浮點數值"
      },
      en: {
        title: "LED CCT Linear Adjustment Calculator",
        base_cct: "Base Physical CCT (Calibration)",
        base_desc: "The default white point CCT of the display at the factory or during hardware calibration.",
        target_cct: "Target CCT Adjustment",
        warm: "Warm",
        standard: "Standard",
        cold: "Cold",
        preview: "Visual CCT Preview",
        hw_ratio: "Hardware RGB Control Ratios",
        hw_desc: "To shift from {{base}}K to {{target}}K while staying on the Planckian locus, apply these linear attenuation ratios:",
        algorithm: "Core Algorithm Logic",
        step1: "Use CIE 1931 analytical formula to calculate exact coordinates on the Planckian locus.",
        step2: "Convert xy to XYZ, then to linear light energy (without Gamma) via sRGB matrix.",
        step3: "Divide target energy by base energy, and normalize the highest channel to 1.0 (100%).",
        code_comment: "Floating-point values sent to hardware"
      },
      ja: {
        title: "LED 色温度リニア調整計算ツール",
        base_cct: "基準物理色温度 (キャリブレーション)",
        base_desc: "工場出荷時またはハードウェアキャリブレーション時のデフォルトの白色点色温度。",
        target_cct: "目標色温度調整",
        warm: "暖色",
        standard: "標準白",
        cold: "寒色",
        preview: "視覚的な色温度プレビュー",
        hw_ratio: "ハードウェア RGB 制御比率",
        hw_desc: "{{base}}K から {{target}}K に変更し、プランク軌跡上に保つため、以下の線形減衰比率を適用します：",
        algorithm: "アルゴリズムのコアロジック",
        step1: "CIE 1931 解析式を使用して、プランク軌跡上の正確な座標を計算します。",
        step2: "xy 座標を XYZ 空間に変換後、sRGB マトリックスで線形光エネルギーに変換します。",
        step3: "目標エネルギーを基準エネルギーで割り、最も高いチャンネルを 1.0 (100%) に正規化します。",
        code_comment: "ハードウェアに送信される浮動小数点値"
      }
    };

    /* * 【記憶體優化】
     * 將純數學函式與靜態方法移出 React 組件外部。
     * 這確保了當滑桿被快速拖曳時 (每秒觸發高頻渲染)，
     * 這些龐大的函式不會被瘋狂重複建立與拋棄，有效避免 Garbage Collection 造成的 OOM 與卡頓。
     */
    
    // 多語系翻譯提取函式
    const t = (lang, key, vars) => {
      let text = translations[lang][key] || translations['en'][key];
      if (vars) {
        Object.keys(vars).forEach(k => {
          text = text.replace(`{{${k}}}`, vars[k]);
        });
      }
      return text;
    };

    const cctToXY = (cct) => {
      let x, y;
      let t_val = cct;
      if (t_val < 1667) t_val = 1667;
      if (t_val > 25000) t_val = 25000;

      let t3 = Math.pow(t_val, 3);
      let t2 = Math.pow(t_val, 2);

      if (t_val >= 1667 && t_val <= 4000) {
        x = -0.2661239 * (1e9 / t3) - 0.2343589 * (1e6 / t2) + 0.8776956 * (1e3 / t_val) + 0.179910;
      } else {
        x = -2.0064 * (1e9 / t3) + 1.9018 * (1e6 / t2) + 0.24748 * (1e3 / t_val) + 0.237040;
      }

      let x3 = Math.pow(x, 3);
      let x2 = Math.pow(x, 2);

      if (t_val >= 1667 && t_val <= 2222) {
        y = -1.1063814 * x3 - 1.34811020 * x2 + 2.18555832 * x - 0.20219683;
      } else if (t_val > 2222 && t_val <= 4000) {
        y = -0.9549476 * x3 - 1.37418593 * x2 + 2.09137015 * x - 0.16748867;
      } else {
        y = 3.0817580 * x3 - 5.87338670 * x2 + 3.75112997 * x - 0.37001483;
      }
      return { x, y };
    };

    const cctToLinearRGB = (cct) => {
      const { x, y } = cctToXY(cct);
      const X = x / y;
      const Y = 1.0;
      const Z = (1 - x - y) / y;

      let r = 3.2404542 * X - 1.5371385 * Y - 0.4985314 * Z;
      let g = -0.9692660 * X + 1.8760108 * Y + 0.0415560 * Z;
      let b = 0.0556434 * X - 0.2040259 * Y + 1.0572252 * Z;

      return { r: Math.max(0, r), g: Math.max(0, g), b: Math.max(0, b) };
    };

    const linearToGammaRGB = (linearValue) => {
      let v = linearValue;
      if (v <= 0.0031308) return 12.92 * v;
      return 1.055 * Math.pow(v, 1 / 2.4) - 0.055;
    };

    const getPreviewColor = (cct) => {
      const linear = cctToLinearRGB(cct);
      const maxVal = Math.max(linear.r, linear.g, linear.b);
      const r = Math.round(Math.min(255, Math.max(0, linearToGammaRGB(linear.r / maxVal) * 255)));
      const g = Math.round(Math.min(255, Math.max(0, linearToGammaRGB(linear.g / maxVal) * 255)));
      const b = Math.round(Math.min(255, Math.max(0, linearToGammaRGB(linear.b / maxVal) * 255)));
      return `rgb(${r}, ${g}, ${b})`;
    };

    // SVG 圖示元件
    const Icons = {
      MonitorPlay: () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-blue-400"><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/><path d="m10 10 5 3-5 3v-6z"/></svg>,
      Globe: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-slate-400"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>,
      Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
      Sliders: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2"><line x1="4" x2="20" y1="21" y2="14"/><line x1="4" x2="20" y1="10" y2="3"/><line x1="12" x2="12" y1="21" y2="12"/><line x1="12" x2="12" y1="8" y2="3"/><line x1="8" x2="16" y1="14" y2="14"/><line x1="8" x2="16" y1="8" y2="8"/></svg>,
      Zap: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2 text-yellow-400"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    };

    function App() {
      // 預設語言為日文 (ja)
      const [lang, setLang] = useState('ja');
      const [baseCCT, setBaseCCT] = useState(8800);
      const [targetCCT, setTargetCCT] = useState(8800);

      // 計算比率 (利用 useMemo 進行緩存，確保只有數值變動時才重新計算)
      const ratios = useMemo(() => {
        const baseRGB = cctToLinearRGB(baseCCT);
        const targetRGB = cctToLinearRGB(targetCCT);

        const ratioR = targetRGB.r / baseRGB.r;
        const ratioG = targetRGB.g / baseRGB.g;
        const ratioB = targetRGB.b / baseRGB.b;

        const maxRatio = Math.max(ratioR, ratioG, ratioB);

        return {
          R: ratioR / maxRatio,
          G: ratioG / maxRatio,
          B: ratioB / maxRatio
        };
      }, [baseCCT, targetCCT]);

      return (
        <div className="p-6">
          <div className="max-w-3xl mx-auto space-y-6">
            
            {/* Header */}
            <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center pb-4 border-b border-slate-800 gap-4">
              <div className="flex items-center space-x-3">
                <Icons.MonitorPlay />
                <h1 className="text-xl sm:text-2xl font-bold">{t(lang, 'title')}</h1>
              </div>
              
              <div className="flex items-center space-x-2 bg-slate-800 p-2 rounded-lg border border-slate-700 w-fit">
                <Icons.Globe />
                <select 
                  className="bg-transparent text-sm text-slate-300 outline-none cursor-pointer"
                  value={lang}
                  onChange={(e) => setLang(e.target.value)}
                >
                  <option value="ja">日本語</option>
                  <option value="zh">繁體中文</option>
                  <option value="en">English</option>
                </select>
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              {/* 左側設定區 */}
              <div className="space-y-6">
                <div className="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg">
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="text-base sm:text-lg font-semibold flex items-center text-slate-300">
                      <Icons.Settings /> {t(lang, 'base_cct')}
                    </h2>
                    <span className="text-blue-400 font-mono bg-slate-900 px-3 py-1 rounded-md">{baseCCT}K</span>
                  </div>
                  <input 
                    type="number" value={baseCCT} onChange={(e) => setBaseCCT(Number(e.target.value))}
                    className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white outline-none" min="2000" max="15000" step="100"
                  />
                  <p className="text-xs text-slate-500 mt-2">{t(lang, 'base_desc')}</p>
                </div>

                <div className="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg">
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="text-base sm:text-lg font-semibold flex items-center text-slate-300">
                      <Icons.Sliders /> {t(lang, 'target_cct')}
                    </h2>
                    <div className="flex items-center bg-slate-900 px-2 py-1 rounded-md border border-slate-700 focus-within:border-green-500 transition-colors">
                      <input 
                        type="number" 
                        value={targetCCT} 
                        onChange={(e) => setTargetCCT(Number(e.target.value))}
                        className="w-20 bg-transparent text-right text-green-400 font-mono text-xl outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
                        min="1667" max="25000" step="50"
                      />
                      <span className="text-green-400 font-mono ml-1 text-xl">K</span>
                    </div>
                  </div>
                  <input 
                    type="range" min="2500" max="12000" step="50" value={targetCCT}
                    onChange={(e) => setTargetCCT(Number(e.target.value))}
                    className="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-green-500"
                  />
                  <div className="flex justify-between text-xs text-slate-500 mt-2">
                    <span>2500K ({t(lang, 'warm')})</span>
                    <span>6500K ({t(lang, 'standard')})</span>
                    <span>12000K ({t(lang, 'cold')})</span>
                  </div>
                  <div className="mt-6 flex items-center justify-between p-3 bg-slate-900 rounded-lg">
                    <span className="text-sm text-slate-400">{t(lang, 'preview')}</span>
                    <div className="w-24 h-8 rounded-md shadow-inner border border-slate-700" style={{ backgroundColor: getPreviewColor(targetCCT) }}></div>
                  </div>
                </div>
              </div>

              {/* 右側計算結果區 */}
              <div className="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg flex flex-col justify-between">
                <div>
                  <h2 className="text-base sm:text-lg font-semibold flex items-center text-slate-300 mb-6">
                    <Icons.Zap /> {t(lang, 'hw_ratio')}
                  </h2>
                  <p className="text-sm text-slate-400 mb-6 leading-relaxed">
                    {t(lang, 'hw_desc', { base: baseCCT, target: targetCCT })}
                  </p>

                  <div className="space-y-5">
                    {[
                      { label: 'R', value: ratios.R, color: 'bg-red-500', text: 'text-red-400' },
                      { label: 'G', value: ratios.G, color: 'bg-green-500', text: 'text-green-400' },
                      { label: 'B', value: ratios.B, color: 'bg-blue-500', text: 'text-blue-400' },
                    ].map((channel) => (
                      <div key={channel.label} className="space-y-1">
                        <div className="flex justify-between text-sm font-mono">
                          <span className={channel.text}>{channel.label}</span>
                          <span className="text-white">{(channel.value * 100).toFixed(2)} %</span>
                        </div>
                        <div className="w-full bg-slate-900 rounded-full h-3">
                          <div className={`${channel.color} h-3 rounded-full transition-all duration-300 ease-out`} style={{ width: `${channel.value * 100}%` }}></div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
            
            {/* 演算法說明 */}
            <div className="bg-slate-800/50 p-5 rounded-xl border border-slate-700 mt-6 text-sm text-slate-400 leading-relaxed">
              <h3 className="font-semibold text-slate-300 mb-2">{t(lang, 'algorithm')}</h3>
              <ol className="list-decimal list-inside space-y-2">
                <li>{t(lang, 'step1')}</li>
                <li>{t(lang, 'step2')}</li>
                <li>{t(lang, 'step3')}</li>
              </ol>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
